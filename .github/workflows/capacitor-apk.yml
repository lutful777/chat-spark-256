name: Build Capacitor APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'scripts/patch-capacitor-android.mjs'
      - '.github/workflows/capacitor-apk.yml'
      - 'src/**'
      - 'public/**'
      - 'vite.config.ts'

jobs:
  build-capacitor-apk:
    name: Build Capacitor Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Ensure Capacitor Android project exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping cap add"
          fi

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Patch Capacitor Android project
        run: node scripts/patch-capacitor-android.mjs

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Chat-Capacitor-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
