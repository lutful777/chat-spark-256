<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>AI Chat — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f8fafc;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.24), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.18), transparent 28rem),
          #0f172a;
      }
      .card {
        width: min(100%, 420px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 28px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(0,0,0,0.34);
        backdrop-filter: blur(18px);
      }
      .logo {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        color: #020617;
        font-size: 26px;
        font-weight: 800;
      }
      h1 { margin: 20px 0 8px; font-size: 28px; line-height: 1.1; }
      p { margin: 0; color: #cbd5e1; line-height: 1.6; }
      a {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 16px;
        color: #020617;
        background: #7dd3fc;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">AI</div>
      <h1>Kamu sedang offline</h1>
      <p>AI Chat sudah terpasang sebagai PWA. Sambungkan internet lagi untuk memakai AI, Real Time Search, GitHub, Outlook, Image, dan Video.</p>
      <a href="/">Coba buka lagi</a>
    </main>
  </body>
</html>
