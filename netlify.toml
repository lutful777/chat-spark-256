[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"

[functions]
  directory = "dist/server"

# Plan A: TanStack Start SSR. Static assets are served from dist/client,
# and every page/API request that is not a static asset is handled by the
# server function generated by the build.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
