[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"

# TanStack Start/Nitro generates the Netlify function output during build.
# Do not point Netlify to dist/client or dist/server; those paths can make the
# deployed site return 404 even when the build succeeds.
